<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>補正下着試着 管理画面(サンプル)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f9f4f7; color: #333; }

    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .login-box { background: white; border-radius: 12px; padding: 40px 32px; width: 100%; max-width: 380px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
    .login-box h2 { color: #7B4F6E; margin-bottom: 24px; font-size: 22px; }
    .login-box input { width: 100%; padding: 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 16px; text-align: center; }
    .login-box button { width: 100%; padding: 14px; background: #7B4F6E; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
    .login-box button:hover { background: #6a4060; }
    .login-error { color: #c0392b; font-size: 14px; margin-top: 10px; display: none; }

    #adminContent { display: none; }
    .topbar { background: #7B4F6E; color: white; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
    .topbar h1 { font-size: 18px; }
    .topbar .logout { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }

    .main { padding: 24px; max-width: 1200px; margin: 0 auto; }

    /* 期間設定パネル */
    .period-panel {
      background: white; border-radius: 10px; padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 24px;
      border-left: 4px solid #7B4F6E;
    }
    .period-panel h2 { font-size: 16px; color: #7B4F6E; margin-bottom: 16px; }
    .period-form { display: flex; gap: 16px; align-items: flex-end; flex-wrap: wrap; }
    .period-field { display: flex; flex-direction: column; gap: 6px; }
    .period-field label { font-size: 13px; color: #888; font-weight: bold; }
    .period-field input[type="date"] {
      padding: 10px 14px; border: 1.5px solid #ddd; border-radius: 8px;
      font-size: 15px; background: #fafafa; cursor: pointer;
    }
    .period-field input[type="date"]:focus { border-color: #7B4F6E; outline: none; }
    .btn-period-save { padding: 10px 24px; background: #7B4F6E; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; }
    .btn-period-save:hover { background: #6a4060; }
    .btn-period-clear { padding: 10px 16px; background: #f5f5f5; color: #888; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; cursor: pointer; }
    .btn-period-clear:hover { background: #eee; }
    .period-status { font-size: 13px; margin-top: 10px; padding: 8px 12px; border-radius: 6px; display: none; }
    .period-status.success { background: #e8f5e9; color: #2e7d32; display: block; }
    .period-status.error { background: #fce8e6; color: #c62828; display: block; }
    .current-period { font-size: 13px; color: #666; margin-top: 8px; }
    .current-period span { font-weight: bold; color: #7B4F6E; }

    /* サマリー */
    .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .card { background: white; border-radius: 10px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .card .num { font-size: 32px; font-weight: bold; color: #7B4F6E; }
    .card .label { font-size: 13px; color: #888; margin-top: 4px; }
    .card.highlight { border-left: 4px solid #7B4F6E; }
    .card.alert { border-left: 4px solid #e74c3c; }
    .card .num.green { color: #27ae60; }
    .card .num.red { color: #e74c3c; }
    .card .num.blue { color: #2980b9; }

    .toolbar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
    .toolbar button { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; }
    .btn-refresh { background: #7B4F6E; color: white; }
    .btn-csv { background: #27ae60; color: white; }
    .btn-refresh:hover { background: #6a4060; }
    .btn-csv:hover { background: #219a52; }
    .filter-select { padding: 10px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; background: white; }

    .table-wrap { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow: hidden; }
    .table-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { background: #7B4F6E; color: white; padding: 14px 12px; text-align: left; white-space: nowrap; }
    td { padding: 12px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fdf8fc; }

    .badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; white-space: nowrap; }
    .badge-green { background: #e8f5e9; color: #2e7d32; }
    .badge-yellow { background: #fff8e1; color: #e65100; }
    .badge-gray { background: #f5f5f5; color: #777; }
    .badge-red { background: #fce8e6; color: #c62828; }
    .badge-purple { background: #f3e5f5; color: #6a1b9a; }
    .badge-blue { background: #e3f2fd; color: #1565c0; }

    .btn-delete { background: none; border: 1px solid #ddd; color: #999; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .btn-delete:hover { border-color: #e74c3c; color: #e74c3c; }

    .loading { text-align: center; padding: 40px; color: #888; font-size: 16px; }
    .empty { text-align: center; padding: 40px; color: #888; }
  </style>
</head>
<body>

<!-- ログイン画面 -->
<div class="login-wrap" id="loginArea">
  <div class="login-box">
    <h2>👗 補正下着試着 管理画面</h2>
    <input type="password" id="passwordInput" placeholder="パスワードを入力">
    <button onclick="checkPassword()">ログイン</button>
    <div class="login-error" id="loginError">⚠️ パスワードが違います</div>
  </div>
</div>

<!-- 管理画面 -->
<div id="adminContent">
  <div class="topbar">
    <h1>👗 補正下着試着 アンケート管理</h1>
    <button class="logout" onclick="logout()">ログアウト</button>
  </div>

  <div class="main">

    <!-- 期間設定パネル -->
    <div class="period-panel">
      <h2>📅 アンケート受付期間の設定</h2>
      <div class="period-form">
        <div class="period-field">
          <label>開始日</label>
          <input type="date" id="startDateInput">
        </div>
        <div class="period-field">
          <label>終了日</label>
          <input type="date" id="endDateInput">
        </div>
        <button class="btn-period-save" onclick="savePeriod()">💾 保存</button>
        <button class="btn-period-clear" onclick="clearPeriod()">🗑️ 期間を削除</button>
      </div>
      <div class="current-period" id="currentPeriod">現在の設定：読み込み中...</div>
      <div class="period-status" id="periodStatus"></div>
    </div>

    <!-- サマリー -->
    <div class="summary">
      <div class="card highlight"><div class="num" id="totalCount">—</div><div class="label">総回答数</div></div>
      <div class="card highlight"><div class="num green" id="buyCount">—</div><div class="label">購入希望</div></div>
      <div class="card alert"><div class="num red" id="continueCount">—</div><div class="label">毎日着用希望</div></div>
      <div class="card"><div class="num blue" id="referralCount">—</div><div class="label">紹介できる</div></div>
    </div>

    <div class="toolbar">
      <button class="btn-refresh" onclick="fetchData()">🔄 更新</button>
      <button class="btn-csv" onclick="downloadCSV()">📥 CSVダウンロード</button>
      <select class="filter-select" id="filterItem" onchange="renderTable()">
        <option value="">アイテム：すべて</option>
        <option value="ブラジャー">ブラジャー</option>
        <option value="ガードル">ガードル</option>
        <option value="ボディスーツ">ボディスーツ</option>
        <option value="ウエストニッパー">ウエストニッパー</option>
        <option value="複数アイテム">複数アイテム</option>
      </select>
      <select class="filter-select" id="filterPurchase" onchange="renderTable()">
        <option value="">購入意向：すべて</option>
        <option value="すぐに購入したい">すぐに購入したい</option>
        <option value="検討中">検討中</option>
        <option value="もう少し情報が欲しい">もう少し情報が欲しい</option>
        <option value="今は考えていない">今は考えていない</option>
      </select>
      <select class="filter-select" id="filterSatisfaction" onchange="renderTable()">
        <option value="">満足度：すべて</option>
        <option value="大変満足">大変満足</option>
        <option value="満足">満足</option>
        <option value="普通">普通</option>
        <option value="やや不満">やや不満</option>
      </select>
    </div>

    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>日時</th>
              <th>お名前</th>
              <th>アイテム</th>
              <th>満足度</th>
              <th>体型変化</th>
              <th>継続意向</th>
              <th>購入意向</th>
              <th>紹介</th>
              <th>ご意見</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="10" class="loading">読み込み中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
  var allData = [];
  var params = new URLSearchParams(location.search);
  var tenant = params.get('tenant') || 'diana-fitting';
  var type   = params.get('type')   || 'fitting_survey';

  var BASE_URL = location.hostname === 'localhost'
    ? 'http://localhost:7071'
    : 'https://func-dstyle-survey-gab2dwg3gdcqecgz.japaneast-01.azurewebsites.net';

  function formatDate(dateStr) {
    if (!dateStr) return '';
    var parts = dateStr.split('-');
    return parts[0] + '年' + parseInt(parts[1]) + '月' + parseInt(parts[2]) + '日';
  }

  // 認証
  async function checkPassword() {
    var pw = document.getElementById('passwordInput').value;
    var loginError = document.getElementById('loginError');
    loginError.style.display = 'none';
    try {
      var res = await fetch(BASE_URL + '/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw, tenant: tenant })
      });
      if (res.ok) {
        var data = await res.json();
        sessionStorage.setItem('adminToken', data.token);
        document.getElementById('loginArea').style.display = 'none';
        document.getElementById('adminContent').style.display = 'block';
        fetchPeriod();
        fetchData();
      } else {
        loginError.style.display = 'block';
      }
    } catch (e) {
      loginError.style.display = 'block';
    }
  }

  document.getElementById('passwordInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') checkPassword();
  });

  function logout() {
    sessionStorage.removeItem('adminToken');
    document.getElementById('loginArea').style.display = 'flex';
    document.getElementById('adminContent').style.display = 'none';
    document.getElementById('passwordInput').value = '';
  }

  // 期間取得
  async function fetchPeriod() {
    try {
      var res = await fetch(BASE_URL + '/api/period?tenant=' + tenant);
      var period = await res.json();
      document.getElementById('startDateInput').value = period.startDate || '';
      document.getElementById('endDateInput').value   = period.endDate   || '';
      updateCurrentPeriodDisplay(period.startDate, period.endDate);
    } catch (e) {
      document.getElementById('currentPeriod').textContent = '現在の設定：取得できませんでした';
    }
  }

  function updateCurrentPeriodDisplay(startDate, endDate) {
    var el = document.getElementById('currentPeriod');
    if (!startDate && !endDate) {
      el.innerHTML = '現在の設定：<span>期間制限なし（常時受付中）</span>';
    } else if (startDate && endDate) {
      el.innerHTML = '現在の設定：<span>' + formatDate(startDate) + ' 〜 ' + formatDate(endDate) + '</span>';
    } else if (startDate) {
      el.innerHTML = '現在の設定：<span>' + formatDate(startDate) + ' 以降</span>';
    } else {
      el.innerHTML = '現在の設定：<span>' + formatDate(endDate) + ' まで</span>';
    }
  }

  // 期間保存
  async function savePeriod() {
    var startDate = document.getElementById('startDateInput').value || null;
    var endDate   = document.getElementById('endDateInput').value   || null;
    var status = document.getElementById('periodStatus');

    if (startDate && endDate && startDate > endDate) {
      status.className = 'period-status error';
      status.textContent = '⚠️ 開始日は終了日より前に設定してください。';
      return;
    }

    try {
      var token = sessionStorage.getItem('adminToken');
      var res = await fetch(BASE_URL + '/api/period', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-token': token },
        body: JSON.stringify({ tenant: tenant, startDate: startDate, endDate: endDate })
      });
      if (res.ok) {
        status.className = 'period-status success';
        status.textContent = '✅ 受付期間を保存しました。';
        updateCurrentPeriodDisplay(startDate, endDate);
      } else {
        throw new Error('保存失敗');
      }
    } catch (e) {
      status.className = 'period-status error';
      status.textContent = '❌ 保存に失敗しました。';
    }
    setTimeout(function() { status.style.display = 'none'; }, 3000);
  }

  // 期間削除
  async function clearPeriod() {
    if (!confirm('受付期間の設定を削除しますか？（期間制限なしになります）')) return;
    document.getElementById('startDateInput').value = '';
    document.getElementById('endDateInput').value = '';
    await savePeriod();
  }

  // データ取得
  async function fetchData() {
    document.getElementById('tableBody').innerHTML = '<tr><td colspan="10" class="loading">読み込み中...</td></tr>';
    try {
      var token = sessionStorage.getItem('adminToken');
      var res = await fetch(BASE_URL + '/api/log?tenant=' + tenant + '&type=' + type, {
        headers: { 'x-admin-token': token }
      });
      if (!res.ok) throw new Error('取得失敗');
      allData = await res.json();
      allData.sort(function(a, b) { return new Date(b.createdAt) - new Date(a.createdAt); });
      updateSummary();
      renderTable();
    } catch (e) {
      document.getElementById('tableBody').innerHTML = '<tr><td colspan="10" class="empty">❌ ' + e.message + '</td></tr>';
    }
  }

  function updateSummary() {
    document.getElementById('totalCount').textContent = allData.length;
    document.getElementById('buyCount').textContent = allData.filter(function(d) { return d.purchase === 'すぐに購入したい'; }).length;
    document.getElementById('continueCount').textContent = allData.filter(function(d) { return d.continuation === 'ぜひ続けたい'; }).length;
    document.getElementById('referralCount').textContent = allData.filter(function(d) { return d.referral === 'いる'; }).length;
  }

  function renderTable() {
    var fi = document.getElementById('filterItem').value;
    var fp = document.getElementById('filterPurchase').value;
    var fs = document.getElementById('filterSatisfaction').value;
    var filtered = allData.filter(function(d) {
      return (!fi || d.item === fi) && (!fp || d.purchase === fp) && (!fs || d.satisfaction === fs);
    });
    var tbody = document.getElementById('tableBody');
    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td colspan="10" class="empty">該当データがありません</td></tr>';
      return;
    }
    tbody.innerHTML = filtered.map(function(d) {
      var date = new Date(d.createdAt).toLocaleString('ja-JP', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
      var sBadge = (d.satisfaction === '大変満足' || d.satisfaction === '満足') ? 'badge-green'
                 : d.satisfaction === 'やや不満' ? 'badge-red' : 'badge-gray';
      var cBadge = d.continuation === 'ぜひ続けたい' ? 'badge-green'
                 : d.continuation === '検討したい' ? 'badge-yellow'
                 : d.continuation === '今は難しい' ? 'badge-red' : 'badge-gray';
      var pBadge = d.purchase === 'すぐに購入したい' ? 'badge-purple'
                 : d.purchase === '検討中' ? 'badge-blue'
                 : d.purchase === 'もう少し情報が欲しい' ? 'badge-yellow' : 'badge-gray';
      return '<tr>' +
        '<td style="white-space:nowrap;color:#888;font-size:13px">' + date + '</td>' +
        '<td style="white-space:nowrap;font-weight:bold">' + (d.customerName || '—') + '</td>' +
        '<td style="white-space:nowrap">' + (d.item || '—') + '</td>' +
        '<td><span class="badge ' + sBadge + '">' + (d.satisfaction || '—') + '</span></td>' +
        '<td style="font-size:13px">' + (d.bodyChange || '—') + '</td>' +
        '<td><span class="badge ' + cBadge + '">' + (d.continuation || '—') + '</span></td>' +
        '<td><span class="badge ' + pBadge + '">' + (d.purchase || '—') + '</span></td>' +
        '<td style="font-size:13px">' + (d.referral || '—') + '</td>' +
        '<td style="font-size:13px;max-width:200px">' + (d.feedback || '') + '</td>' +
        '<td><button class="btn-delete" onclick="deleteItem(\'' + d.id + '\')">削除</button></td>' +
        '</tr>';
    }).join('');
  }

  // 削除
  async function deleteItem(id) {
    if (!confirm('このデータを削除しますか？')) return;
    try {
      var token = sessionStorage.getItem('adminToken');
      var res = await fetch(BASE_URL + '/api/log?id=' + id + '&tenant=' + tenant, {
        method: 'DELETE',
        headers: { 'x-admin-token': token }
      });
      if (res.ok) {
        allData = allData.filter(function(d) { return d.id !== id; });
        updateSummary();
        renderTable();
      } else {
        alert('削除に失敗しました');
      }
    } catch (e) {
      alert('削除エラー: ' + e.message);
    }
  }

  // CSVダウンロード
  function downloadCSV() {
    if (allData.length === 0) { alert('データがありません'); return; }
    var headers = ['日時','お名前','アイテム','満足度','体型変化','継続意向','購入意向','紹介','ご意見'];
    var rows = allData.map(function(d) {
      return [
        new Date(d.createdAt).toLocaleString('ja-JP'),
        d.customerName || '', d.item || '', d.satisfaction || '',
        d.bodyChange || '', d.continuation || '', d.purchase || '',
        d.referral || '', (d.feedback || '').replace(/,/g, '、').replace(/\n/g, ' ')
      ].map(function(v) { return '"' + v + '"'; }).join(',');
    });
    var bom = '\uFEFF';
    var csv = bom + [headers.join(',')].concat(rows).join('\n');
    var a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
    a.download = 'fitting_survey_' + new Date().toISOString().slice(0,10) + '.csv';
    a.click();
  }
</script>
</body>
</html>
